services:
  musiclab-backend:
    build: ./backend
    container_name: musiclab-backend
    ports:
      - "8091:8091"
    volumes:
      - /volume1/DS420/Musik:/music
      - /volume1/docker/musiclab/data:/data
      - /volume1/docker/musiclab/backend/app:/app/app:ro
    environment:
      - MUSIC_ROOT=/music
      - DB_PATH=/data/musiclab.sqlite
      - TZ=Europe/Berlin
      - LOG_TZ=Europe/Berlin
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  musiclab-frontend:
    image: nginx:alpine
    container_name: musiclab-frontend
    ports:
      - "8092:80"
    volumes:
      - /volume1/docker/musiclab/frontend:/usr/share/nginx/html:ro
      - /volume1/docker/musiclab/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      musiclab-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    restart: unless-stopped
