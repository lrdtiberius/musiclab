<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>MusicLab</title>
<style>
body{margin:0;background:#0f1115;color:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}header{padding:18px 28px;background:#171a21;border-bottom:1px solid #2b2f3a;display:flex;justify-content:space-between;align-items:center}.app{display:grid;grid-template-columns:320px 1fr;gap:18px;padding:18px}.card{background:#171a21;border:1px solid #2b2f3a;border-radius:14px;padding:16px}button,input{background:#242936;color:#fff;border:1px solid #3a4050;border-radius:9px;padding:10px}button{cursor:pointer}button:hover{background:#303748}.stats{display:flex;gap:12px}.stat{background:#242936;border-radius:12px;padding:14px;min-width:120px}.list{max-height:70vh;overflow:auto}.item{padding:10px;border-bottom:1px solid #2b2f3a;cursor:pointer}.item:hover,.active{background:#242936}.bar{height:12px;background:#333;border-radius:9px;overflow:hidden}.fill{height:12px;background:#4caf50;width:0}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #2b2f3a;padding:8px;text-align:left}.muted{color:#a6adbb}h1,h2,h3{margin-top:0}</style></head><body>
<header><h1>🎵 MusicLab <span class="muted">v0.1</span></h1><button onclick="scan()">Bibliothek scannen</button></header>
<div class="app"><div class="card"><input id="search" placeholder="Interpret suchen..." style="width:92%" oninput="loadArtists()"><h3>Interpreten</h3><div id="artists" class="list"></div></div>
<div><div class="card"><div class="stats"><div class="stat"><b id="sArtists">0</b><br><span class="muted">Interpreten</span></div><div class="stat"><b id="sAlbums">0</b><br><span class="muted">Alben</span></div><div class="stat"><b id="sTracks">0</b><br><span class="muted">Titel</span></div><div class="stat"><b id="sDuration">0h</b><br><span class="muted">Dauer</span></div></div><br><div class="bar"><div id="fill" class="fill"></div></div><p id="status" class="muted">Bereit</p></div><br>
<div class="card"><h2 id="selectedArtist">Albumliste</h2><div id="albums"></div></div><br><div class="card"><h2 id="selectedAlbum">Titel</h2><div id="tracks"></div></div></div></div>
<script>
const API='http://'+location.hostname+':8091/api'; let currentArtist='';
function fmtDur(s){s=Math.round(s||0);let h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h?`${h}h ${m}m`:`${m}m`}
async function scan(){await fetch(API+'/scan',{method:'POST'});}
async function refresh(){let st=await fetch(API+'/status').then(r=>r.json());let pct=st.total?Math.round(st.done/st.total*100):0;fill.style.width=pct+'%';status.innerText=`${st.message} ${st.done}/${st.total} ${st.current||''}`;let s=await fetch(API+'/stats').then(r=>r.json());sArtists.innerText=s.artists;sAlbums.innerText=s.albums;sTracks.innerText=s.tracks;sDuration.innerText=fmtDur(s.duration)}
async function loadArtists(){let q=search.value;let arr=await fetch(API+'/artists?q='+encodeURIComponent(q)).then(r=>r.json());artists.innerHTML=arr.map(a=>`<div class="item" onclick="loadAlbums('${encodeURIComponent(a.artist)}')"><b>${a.artist}</b><br><span class="muted">${a.albums} Alben · ${a.tracks} Titel</span></div>`).join('')}
async function loadAlbums(a){currentArtist=decodeURIComponent(a);selectedArtist.innerText=currentArtist;let arr=await fetch(API+'/albums?artist='+a).then(r=>r.json());albums.innerHTML=arr.map(x=>`<div class="item" onclick="loadTracks('${encodeURIComponent(x.album)}')"><b>${x.album}</b><br><span class="muted">${x.tracks} Titel · ${fmtDur(x.duration)}</span></div>`).join('')}
async function loadTracks(alb){let album=decodeURIComponent(alb);selectedAlbum.innerText=album;let arr=await fetch(API+`/tracks?artist=${encodeURIComponent(currentArtist)}&album=${alb}`).then(r=>r.json());tracks.innerHTML='<table><tr><th>#</th><th>Titel</th><th>Dauer</th><th>Codec</th><th>Bitrate</th></tr>'+arr.map(t=>`<tr><td>${t.track_no||''}</td><td>${t.title}</td><td>${fmtDur(t.duration)}</td><td>${t.codec}</td><td>${t.bitrate?Math.round(t.bitrate/1000)+' kb/s':''}</td></tr>`).join('')+'</table>'}
setInterval(refresh,2000);refresh();loadArtists();
</script></body></html>
