<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MusicLab</title>
<style>
:root{--bg:#111317;--panel:#1b1f27;--panel2:#242a35;--txt:#e8eaf0;--muted:#9aa3b2;--accent:#6aa9ff;--bad:#ff6b6b;--ok:#7bd88f;--gold:#ffcc66}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
header{height:64px;display:flex;align-items:center;gap:18px;padding:0 24px;background:#0d0f13;border-bottom:1px solid #2a303b}
h1{font-size:22px;margin:0}.muted{color:var(--muted)}button,input{border:0;border-radius:10px;padding:10px 14px;font-size:14px}button{background:var(--accent);color:#07111f;font-weight:700;cursor:pointer}button.secondary{background:#303847;color:var(--txt)}button.danger{background:#ffb86b;color:#241000}button:disabled{opacity:.45;cursor:not-allowed}input{background:#0f1218;color:var(--txt);border:1px solid #333b49}
.layout{display:grid;grid-template-columns:300px 1fr;gap:16px;padding:16px}.panel{background:var(--panel);border:1px solid #2a303b;border-radius:16px;padding:16px}.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:16px}.stat{background:var(--panel2);border-radius:14px;padding:14px}.stat b{font-size:22px;display:block}.list{max-height:calc(100vh - 230px);overflow:auto}.row{padding:10px;border-radius:10px;cursor:pointer}.row:hover,.row.sel{background:var(--panel2)}.modeSwitch{display:flex;gap:6px;margin-bottom:10px}.modeSwitch button{flex:1;padding:8px 10px}.modeSwitch button.active{background:var(--accent);color:#07111f}.modeSwitch button:not(.active){background:#303847;color:var(--txt)}.albums{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;max-height:300px;overflow-y:auto;padding-right:6px;scrollbar-gutter:stable}.empty{color:var(--muted);padding:12px}.albumsCount{color:var(--muted);font-size:12px}.album{background:var(--panel2);border-radius:14px;padding:14px;cursor:pointer}.album.sel{outline:2px solid var(--accent)}.album.ref{outline:2px solid var(--gold)}.refbox{display:flex;gap:14px;align-items:center;justify-content:space-between;min-height:74px;padding:16px 18px}.refmeta{display:flex;flex-direction:column;gap:6px;min-width:0;flex:1}.refpill{display:block;max-width:100%;width:fit-content;background:#2b2618;border:1px solid #6b5422;color:#ffd98a;border-radius:12px;padding:8px 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.25}.refempty{color:var(--muted)}.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}table{width:100%;border-collapse:collapse}th,td{padding:9px;border-bottom:1px solid #303847;text-align:left}th{color:var(--muted);font-weight:600}.right{text-align:right}.bar{height:10px;background:#303847;border-radius:999px;overflow:hidden}.fill{height:100%;width:0%;background:var(--accent)}.small{font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<header><h1>🎵 MusicLab <span class="muted">v0.6.1</span></h1><button onclick="scan()">Bibliothek neu scannen</button><button class="secondary" onclick="analyzeAll()">Alles analysieren</button><span id="status" class="muted">Bereit</span></header>
<div class="layout">
<aside class="panel"><div class="modeSwitch"><button id="modeArtist" class="active" onclick="setBrowserMode('artist')">Interpreten</button><button id="modeAlbum" onclick="setBrowserMode('album')">Alben</button></div><input id="search" placeholder="Interpreten suchen..." oninput="loadBrowser()" style="width:100%;margin-bottom:12px"><h3 id="browserTitle">Interpreten</h3><div id="browserList" class="list"></div></aside>
<main>
<div class="grid"><div class="stat"><b id="sArtists">0</b><span>Interpreten</span></div><div class="stat"><b id="sAlbums">0</b><span>Alben</span></div><div class="stat"><b id="sTracks">0</b><span>Titel</span></div><div class="stat"><b id="sAnalyzed">0</b><span>Analysiert</span></div><div class="stat"><b id="sDuration">0h</b><span>Dauer</span></div><div class="stat"><b id="sSchema">-</b><span>DB Schema</span></div></div>
<div class="panel refbox" style="margin-bottom:16px"><div class="refmeta"><b>⭐ Referenzalbum</b><div id="referenceBox" class="small refempty">Noch kein Referenzalbum festgelegt.</div></div><button class="secondary" onclick="useReferenceTarget()" id="btnUseRef" disabled>Ziel-LUFS übernehmen</button></div>
<div class="panel" style="margin-bottom:16px"><div class="bar"><div id="progress" class="fill"></div></div><div id="progressText" class="small" style="margin-top:8px">Bereit</div></div>
<section class="panel"><h2>Albumliste</h2><div class="albumTools"><span id="albumsCount" class="albumsCount">Kein Interpret gewählt</span></div><div id="albums" class="albums"></div></section>
<section class="panel" style="margin-top:16px"><div class="toolbar"><h2 style="margin-right:auto">Titel</h2><button onclick="setReference()" id="btnRef" disabled>⭐ Als Referenz</button><button onclick="analyzeAlbum()" id="btnAnalyze" disabled>Album analysieren</button><button class="danger" onclick="normalizeAlbum()" id="btnNorm" disabled>Album normalisieren</button><span>Ziel-LUFS</span><input id="targetLufs" style="width:80px"><span>TP</span><input id="truePeak" style="width:70px"><span>LRA</span><input id="lra" style="width:70px"><button class="secondary" onclick="saveSettings()">Speichern</button></div><div id="albumSummary" class="small"></div><table><thead><tr><th>#</th><th>Titel</th><th class="right">LUFS</th><th class="right">TP</th><th class="right">LRA</th><th class="right">Bitrate</th><th>Codec</th></tr></thead><tbody id="tracks"></tbody></table></section>
<section class="panel" style="margin-top:16px"><h2>Log</h2><pre id="logBox" class="small" style="white-space:pre-wrap;max-height:180px;overflow:auto;background:#0f1218;border:1px solid #303847;border-radius:10px;padding:10px">Noch kein Log.</pre></section>
</main>
</div>
<script>
const API='http://'+location.hostname+':8091/api';
let selectedArtist=null, selectedAlbum=null;
let browserMode='artist';
let lastRunning=false;
let uiBusy=false;
let reference=null;

function fmt(n,d=1){return n===null||n===undefined?'':Number(n).toFixed(d)}
function dur(s){s=Number(s||0);let h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h?`${h}h ${m}m`:`${m}m`}
function trackNo(t){if(!t.track_number)return'';return (!t.track_total || Number(t.track_total)===0) ? String(t.track_number) : `${t.track_number}/${t.track_total}`}
function relPath(p){return String(p||'').replace(/^\/music\//,'')}
function escHtml(v){return String(v ?? '').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
async function j(url,opt){
  const r = await fetch(url,opt);
  if(!r.ok){
    const txt = await r.text().catch(()=>'');
    throw new Error(`${r.status} ${r.statusText} ${txt}`);
  }
  return r.json();
}

function setBusy(isBusy){
  uiBusy=!!isBusy;
  [btnAnalyze,btnNorm,btnRef].forEach(b=>{ if(b) b.disabled = isBusy || !selectedAlbum; });
}

function albumCard(x){
  const ref=isReferenceAlbum(selectedArtist,x.album);
  const selected=x.album===selectedAlbum;
  const cls=`album ${selected?'sel':''} ${ref?'ref':''}`;
  const title=`${x.album}`;
  return `<div class="${cls}" title="${escHtml(title)}" onclick='selectAlbum(${JSON.stringify(x.album)})'><b>${ref?'⭐ ':''}${escHtml(x.album)}</b><br><span class="small">${x.tracks} Titel · ${x.analyzed}/${x.tracks} analysiert</span><br><span class="small">Ø ${x.avg_lufs??'-'} LUFS · TP ${x.max_true_peak??'-'} · LRA ${x.avg_lra??'-'}</span></div>`;
}

async function loadSettings(){
  let s=await j(API+'/settings');
  targetLufs.value=s.target_lufs;
  truePeak.value=s.true_peak;
  lra.value=s.lra;
}

async function saveSettings(){
  await j(API+'/settings',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({target_lufs:targetLufs.value,true_peak:truePeak.value,lra:lra.value})
  })
}


async function loadReference(){
  try{
    reference=await j(API+'/reference');
    if(reference && reference.is_set){
      referenceBox.className='small';
      referenceBox.innerHTML=`<span class="refpill">${escHtml(reference.artist)} – ${escHtml(reference.album)} · Ø ${reference.avg_lufs ?? '-'} LUFS · TP ${reference.max_true_peak ?? '-'} · LRA ${reference.avg_lra ?? '-'}</span>`;
      btnUseRef.disabled = reference.avg_lufs === null || reference.avg_lufs === undefined;
    }else{
      referenceBox.className='small refempty';
      referenceBox.textContent='Noch kein Referenzalbum festgelegt.';
      btnUseRef.disabled=true;
    }
  }catch(e){
    referenceBox.textContent='Referenz konnte nicht geladen werden.';
    btnUseRef.disabled=true;
  }
}

function isReferenceAlbum(artist, album){
  return reference && reference.is_set && reference.artist===artist && reference.album===album;
}

async function setReference(){
  if(!selectedArtist || !selectedAlbum) return;
  try{
    let ref=await j(API+'/reference',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({artist:selectedArtist, album:selectedAlbum})
    });
    reference=ref;
    await loadSettings();
    await loadReference();
    if(selectedArtist) await selectArtist(selectedArtist,true);
    if(selectedAlbum) await selectAlbum(selectedAlbum);
    status.textContent='Referenzalbum gesetzt';
  }catch(e){
    status.textContent='Referenz-Fehler';
    alert('Referenz konnte nicht gesetzt werden:\n'+e.message+'\n\nHinweis: Das Album muss zuerst analysiert sein.');
  }
}

function useReferenceTarget(){
  if(reference && reference.is_set && reference.avg_lufs!==null && reference.avg_lufs!==undefined){
    targetLufs.value=reference.avg_lufs;
  }
}

async function loadStats(){
  let s=await j(API+'/stats');
  sArtists.textContent=s.artists;
  sAlbums.textContent=s.albums;
  sTracks.textContent=s.tracks;
  sAnalyzed.textContent=s.analyzed;
  sDuration.textContent=dur(s.duration);
  sSchema.textContent=s.schema_version;
}

function setBrowserMode(mode){
  browserMode=mode;
  search.value='';
  modeArtist.classList.toggle('active', mode==='artist');
  modeAlbum.classList.toggle('active', mode==='album');
  browserTitle.textContent = mode==='artist' ? 'Interpreten' : 'Alben';
  search.placeholder = mode==='artist' ? 'Interpreten suchen...' : 'Alben suchen...';
  loadBrowser();
}

async function loadBrowser(){
  if(browserMode==='album') return loadAlbumBrowser();
  return loadArtists();
}

async function loadArtists(){
  let q=encodeURIComponent(search.value||'');
  let a=await j(API+'/artists?q='+q);
  browserList.innerHTML=a.map(x=>`<div class="row ${x.artist===selectedArtist?'sel':''}" onclick='selectArtist(${JSON.stringify(x.artist)})'><b>${escHtml(x.artist)}</b><br><span class="small">${x.albums} Alben · ${x.tracks} Titel</span></div>`).join('') || '<div class="empty">Keine Interpreten gefunden.</div>';
}

async function loadAlbumBrowser(){
  let q=encodeURIComponent(search.value||'');
  let a=await j(API+'/library_albums?q='+q);
  browserList.innerHTML=a.map(x=>`<div class="row ${x.artist===selectedArtist && x.album===selectedAlbum?'sel':''}" onclick='selectAlbumFromBrowser(${JSON.stringify(x.artist)}, ${JSON.stringify(x.album)})'><b>${escHtml(x.album)}</b><br><span class="small">${escHtml(x.artist)} · ${x.tracks} Titel · ${x.analyzed}/${x.tracks} analysiert</span></div>`).join('') || '<div class="empty">Keine Alben gefunden.</div>';
}

async function selectAlbumFromBrowser(artist, album){
  selectedArtist=artist;
  selectedAlbum=album;
  await loadBrowser();
  await loadAlbums();
  await selectAlbum(album);
}

async function selectArtist(a, keepAlbum=false){
  selectedArtist=a;
  if(!keepAlbum){
    selectedAlbum=null;
  }

  await loadBrowser();
  await loadAlbums();

  if(!keepAlbum){
    tracks.innerHTML='';
    albumSummary.textContent='';
    setBusy(false);
    btnRef.disabled=true;
    btnAnalyze.disabled=true;
    btnNorm.disabled=true;
  }
}

async function loadAlbums(){
  if(!selectedArtist){
    albums.innerHTML='<div class="empty">Bitte links einen Interpreten oder ein Album auswählen.</div>';
    albumsCount.textContent='Keine Auswahl';
    return;
  }
  const list=await j(API+'/albums?artist='+encodeURIComponent(selectedArtist));
  albumsCount.textContent = `${selectedArtist} · ` + (list.length===1 ? '1 Album' : `${list.length} Alben`);
  albums.innerHTML=list.length ? list.map(albumCard).join('') : '<div class="empty">Kein Album gefunden.</div>';

  if(selectedAlbum && !list.some(x=>x.album===selectedAlbum)){
    selectedAlbum=null;
    tracks.innerHTML='';
    albumSummary.textContent='';
    btnRef.disabled=true;
    btnAnalyze.disabled=true;
    btnNorm.disabled=true;
  }
}

async function selectAlbum(a){
  selectedAlbum=a;

  document.querySelectorAll('.album').forEach(e=>e.classList.remove('sel'));
  [...document.querySelectorAll('.album')].find(e=>(e.querySelector('b')?.textContent||'').replace(/^⭐\s*/, '')===a)?.classList.add('sel');

  let t=await j(API+'/tracks?artist='+encodeURIComponent(selectedArtist)+'&album='+encodeURIComponent(a));
  tracks.innerHTML=t.map(x=>`<tr><td>${trackNo(x)}</td><td>${escHtml(x.title)}<br><span class="small">Pfad: ${escHtml(relPath(x.path))}</span></td><td class="right">${fmt(x.input_i,1)}</td><td class="right">${fmt(x.input_tp,1)}</td><td class="right">${fmt(x.input_lra,1)}</td><td class="right">${x.bitrate?Math.round(x.bitrate/1000):''}</td><td>${escHtml(x.codec)}</td></tr>`).join('');

  let an=await j(API+'/album_analysis?artist='+encodeURIComponent(selectedArtist)+'&album='+encodeURIComponent(a));
  albumSummary.textContent=`${an.tracks} Titel · ${an.analyzed} analysiert · Ø ${an.avg_lufs??'-'} LUFS · TP ${an.max_true_peak??'-'} · LRA ${an.avg_lra??'-'}`;

  btnRef.disabled=false;
  btnAnalyze.disabled=false;
  btnNorm.disabled=false;
}

async function scan(){
  try{
    lastRunning=true;
    status.textContent='Scan wird gestartet...';
    await j(API+'/scan',{method:'POST'});
    await poll();
  }catch(e){
    status.textContent='Scan-Fehler';
    logBox.textContent='Scan konnte nicht gestartet werden:\n'+e.message;
    console.error(e);
  }
}
async function analyzeAll(){
  try{
    lastRunning=true;
    status.textContent='Analyse wird gestartet...';
    await j(API+'/analyze',{method:'POST'});
    await poll();
  }catch(e){
    status.textContent='Analyse-Fehler';
    logBox.textContent='Analyse konnte nicht gestartet werden:\n'+e.message;
    console.error(e);
  }
}
async function analyzeAlbum(){if(selectedArtist&&selectedAlbum){lastRunning=true;await j(API+'/analyze?artist='+encodeURIComponent(selectedArtist)+'&album='+encodeURIComponent(selectedAlbum),{method:'POST'});poll()}}
async function normalizeAlbum(){if(!selectedArtist||!selectedAlbum)return;if(!confirm('Album wird direkt überschrieben. Fortfahren?'))return;lastRunning=true;await j(API+'/normalize?artist='+encodeURIComponent(selectedArtist)+'&album='+encodeURIComponent(selectedAlbum),{method:'POST'});poll()}

async function loadLog(){
  try{
    let l=await j(API+'/log');
    let lines=[...(l.errors||[]), ...(l.lines||[]).slice(-25)];
    logBox.textContent=lines.length ? lines.join('\n') : 'Noch kein Log.';
    logBox.scrollTop=logBox.scrollHeight;
  }catch(e){}
}

async function poll(){
  let s=await j(API+'/status');
  let p=s.total?Math.round(s.done/s.total*100):0;

  progress.style.width=p+'%';
  progressText.textContent=`${s.mode} · ${s.done}/${s.total} · Fehler ${s.errors} · ${s.current||s.message}`;
  status.textContent=s.message;
  const running=!!s.running;
  if(running){
    btnAnalyze.disabled=true; btnNorm.disabled=true; btnRef.disabled=true;
  }else if(selectedAlbum){
    btnAnalyze.disabled=false; btnNorm.disabled=false; btnRef.disabled=false;
  }

  // Nur nach Abschluss eines Jobs neu laden. Kein permanentes Re-Rendering im Idle-Zustand,
  // damit die Albumauswahl nicht wieder zuklappt.
  await loadLog();

  if(lastRunning && !s.running){
    await loadStats();
    await loadReference();
    await loadBrowser();
    if(selectedArtist){
      await selectArtist(selectedArtist,true);
      if(selectedAlbum) await selectAlbum(selectedAlbum);
    }
  }

  lastRunning=s.running;
}

setInterval(poll,2000);
loadSettings();
loadStats();
loadReference();
loadBrowser();
loadAlbums();
loadLog();
poll();
</script>
</body>
</html>
